<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPL - Smart Presence Secure V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --blue-upl: #1a4fa0; --grey-upl: #6c757d; --bg: #f4f6f9; --red: #e74c3c; --green: #27ae60; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 450px; padding: 35px; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); text-align: center; border: 1px solid #eee; }
        .upl-logo { width: 90px; height: 90px; margin: 0 auto 20px; display: block; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue-upl); padding: 5px; }
        h2 { font-size: 19px; font-weight: 700; margin-bottom: 20px; color: #333; }
        .input-group { position: relative; margin-bottom: 18px; text-align: left; }
        .input-group label { position: absolute; top: -10px; left: 16px; background: white; padding: 0 6px; font-size: 11px; color: var(--blue-upl); font-weight: 700; z-index: 2; }
        .input-group input, .input-group select { width: 100%; padding: 15px 18px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 14px; box-sizing: border-box; outline: none; background: #fafafa; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; transition: 0.2s; font-size: 15px; }
        .btn-blue { background: var(--blue-upl); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-grey { background: var(--grey-upl); color: white; }
        .hidden { display: none; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 15px; border: 2px dashed #ddd; background: #000; }
        #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 15px; border: 1px solid #eee; margin: 10px 0; }
        .timer-bar { height: 4px; background: var(--blue-upl); width: 100%; margin-top: 5px; border-radius: 2px; transition: width 1s linear; }
        .type-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .badge-in { background: #d4edda; color: #155724; }
        .badge-out { background: #f8d7da; color: #721c24; }
        #list-presence td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.png" alt="UPL" class="upl-logo">

    <div id="view-home">
        <h2>Portail Académique UPL</h2>
        <button class="btn btn-blue" onclick="showView('view-stu-login')"><i class="fas fa-user-graduate"></i> Espace Étudiant</button>
        <button class="btn btn-grey" onclick="showView('view-prof-login')"><i class="fas fa-chalkboard-teacher"></i> Espace Enseignant</button>
    </div>

    <div id="view-prof-login" class="hidden">
        <h2>Démarrer une Session</h2>
        <div class="input-group"><label>Nom du Cours</label><input type="text" id="p-cours" placeholder="Ex: Algorithmique"></div>
        <div class="input-group">
            <label>Promotion</label>
            <select id="p-class">
                <option value="Bac 1 Technologie">Bac 1 Technologie (IA,GL,SI)</option>
                <option value="Bac 1 IGAE">Bac 1 IGAE</option>
                <option value="Bac 3 GL/IA">Bac 3 GL/IA</option>
            </select>
        </div>
        <div class="input-group">
            <label>Moment de l'appel</label>
            <select id="p-type">
                <option value="ENTREE">Présence à l'Entrée</option>
                <option value="SORTIE">Présence à la Sortie</option>
            </select>
        </div>
        <button class="btn btn-blue" onclick="ouvrirSession()">Générer le QR Code</button>
        <button class="btn btn-grey" onclick="showView('view-home')">Retour</button>
    </div>

    <div id="view-prof-dash" class="hidden">
        <div id="session-badge" class="type-badge"></div>
        <h2 id="dash-title" style="margin-bottom:2px;"></h2>
        <p id="dash-promo" style="font-size:12px; color:var(--grey-upl); margin-bottom:10px;"></p>
        <div id="qrcode"></div>
        <div id="timer" class="timer-bar"></div>
        <button class="btn btn-green" onclick="telechargerExcel()" style="margin-top:15px;"><i class="fas fa-file-excel"></i> Exporter la liste</button>
        <div style="max-height: 180px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 10px;">
            <table id="list-presence" style="width:100%; border-collapse:collapse;"><tbody id="presence-body"></tbody></table>
        </div>
        <button class="btn btn-red" onclick="fermerSession()" style="margin-top:15px;">Clôturer</button>
    </div>

    <div id="view-stu-login" class="hidden">
        <h2>Identification Étudiant</h2>
        <div class="input-group"><label>Nom & Postnom</label><input type="text" id="s-name" placeholder="Ex: Cedrick Lwamba"></div>
        <div class="input-group"><label>Matricule</label><input type="text" id="s-mat" placeholder="24-UPL-000"></div>
        <div class="input-group">
            <label>Ma Promotion</label>
            <select id="s-class">
                <option value="Bac 1 Technologie">Bac 1 Technologie (IA,GL,SI)</option>
                <option value="Bac 1 IGAE">Bac 1 IGAE</option>
            </select>
        </div>
        <div id="reader" class="hidden"></div>
        <button class="btn btn-blue" id="btn-camera" onclick="activerCamera()">Ouvrir le Scanner</button>
        <button class="btn btn-grey" onclick="stopStu()">Annuler</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDPWfmUGOHOXA7MECD_DpvrSTrGAKhMW5E",
        authDomain: "ijc-impact.firebaseapp.com",
        databaseURL: "https://ijc-impact-default-rtdb.firebaseio.com",
        projectId: "ijc-impact",
        storageBucket: "ijc-impact.firebasestorage.app",
        messagingSenderId: "617988549247",
        appId: "1:617988549247:web:bb58ab4e478f2daa6ced4a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let qrInterval = null;
    let html5QrScanner = null;

    function showView(id) {
        ['view-home', 'view-prof-login', 'view-prof-dash', 'view-stu-login'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function getFingerprint() { 
        return btoa(navigator.userAgent.slice(-30) + screen.width + navigator.language); 
    }

    function ouvrirSession() {
        const cours = document.getElementById('p-cours').value;
        const promo = document.getElementById('p-class').value;
        const type = document.getElementById('p-type').value;
        if(!cours) return alert("Nom du cours requis");

        const promoId = btoa(promo).substr(0, 10);
        document.getElementById('dash-title').innerText = cours;
        document.getElementById('dash-promo').innerText = promo;
        const badge = document.getElementById('session-badge');
        badge.innerText = "SESSION : " + type;
        badge.className = `type-badge ${type === 'ENTREE' ? 'badge-in' : 'badge-out'}`;

        showView('view-prof-dash');
        refreshQR(promoId, cours, type);
        qrInterval = setInterval(() => refreshQR(promoId, cours, type), 15000);

        db.ref(`presences/${promoId}`).on('value', snap => {
            const body = document.getElementById('presence-body');
            body.innerHTML = "";
            snap.forEach(child => {
                const s = child.val();
                body.innerHTML += `<tr><td><b>${s.nom}</b><br><small>${s.matricule} - ${s.type}</small></td><td style="color:#888; text-align:right;">${s.heure}</td></tr>`;
            });
        });
    }

    function refreshQR(promoId, cours, type) {
        const token = "UPL-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: token, width: 180, height: 180 });
        db.ref(`active_session/${promoId}`).set({ token: token, type: type });
        const timer = document.getElementById('timer');
        timer.style.width = "100%";
        setTimeout(() => { timer.style.width = "0%"; }, 100);
    }

    function activerCamera() {
        if(!document.getElementById('s-name').value || !document.getElementById('s-mat').value) return alert("Veuillez remplir vos informations");
        document.getElementById('btn-camera').classList.add('hidden');
        document.getElementById('reader').classList.remove('hidden');
        html5QrScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrScanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        const promo = document.getElementById('s-class').value;
        const promoId = btoa(promo).substr(0, 10);
        const matricule = document.getElementById('s-mat').value;
        const fingerprint = getFingerprint();

        db.ref(`active_session/${promoId}`).once('value', snap => {
            const session = snap.val();
            if(session && decodedText === session.token) {
                db.ref(`presences/${promoId}`).once('value', pSnap => {
                    let aFaitEntree = false;
                    let telUtilise = false;

                    pSnap.forEach(c => {
                        const d = c.val();
                        if(d.matricule === matricule && d.type === "ENTREE") aFaitEntree = true;
                        if(d.device_id === fingerprint && d.type === session.type) telUtilise = true;
                    });

                    if(session.type === "SORTIE" && !aFaitEntree) {
                        alert("❌ Refusé : Vous n'avez pas validé l'ENTRÉE !");
                        return stopStu();
                    }
                    if(telUtilise) {
                        alert("❌ Fraude : Ce téléphone a déjà servi pour cette session !");
                        return stopStu();
                    }

                    // Enregistrement UNIQUE (Matricule + Type)
                    const key = `${matricule.replace(/\W/g, '')}_${session.type}`;
                    db.ref(`presences/${promoId}/${key}`).set({
                        nom: document.getElementById('s-name').value,
                        matricule: matricule,
                        type: session.type,
                        device_id: fingerprint,
                        heure: new Date().toLocaleTimeString('fr-FR')
                    }).then(() => {
                        html5QrScanner.clear().then(() => {
                            alert("✅ Présence enregistrée !");
                            stopStu();
                        });
                    });
                });
            } else { alert("❌ QR Expire ou mauvaise promotion"); }
        });
    }

    function telechargerExcel() {
        const promo = document.getElementById('dash-promo').innerText;
        db.ref(`presences/${btoa(promo).substr(0, 10)}`).once('value', snap => {
            let data = [];
            snap.forEach(c => { const {device_id, ...clean} = c.val(); data.push(clean); });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Presences");
            XLSX.writeFile(wb, `UPL_${promo}.xlsx`);
        });
    }

    function stopStu() {
        if(html5QrScanner) html5QrScanner.clear();
        document.getElementById('reader').classList.add('hidden');
        document.getElementById('btn-camera').classList.remove('hidden');
        showView('view-home');
    }

    function fermerSession() {
        if(confirm("Clôturer la session ?")) {
            db.ref(`active_session/${btoa(document.getElementById('dash-promo').innerText).substr(0, 10)}`).remove();
            location.reload();
        }
    }
</script>
</body>
</html>
